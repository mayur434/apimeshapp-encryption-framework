name: Deploy to Stage

on:
  push:
    branches: [stage, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate source files
        run: |
          test -f src/hooks/before-all.js
          test -f src/resolvers/encrypted-operations.js
          test -f src/config/encryption-registry.js
          test -f src/config/type-defs.js
          test -f mesh/sfdc-openapi.json
          echo "All source files present."

      - name: Run tests
        run: npm test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install AIO CLI
        run: npm install -g @adobe/aio-cli

      - name: Configure AIO credentials
        env:
          AIO_RUNTIME_AUTH: ${{ secrets.AIO_RUNTIME_AUTH_STAGE }}
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
        run: |
          aio config:set ims.contexts.cli.access_token "${{ secrets.AIO_ACCESS_TOKEN_STAGE }}" --json

      - name: Build mesh
        run: npm run build:mesh

      - name: Create env file
        run: |
          cat > .env <<EOF
          COMMERCE_GRAPHQL_ENDPOINT=${{ secrets.COMMERCE_GRAPHQL_ENDPOINT_STAGE }}
          SF_BEARER_TOKEN=${{ secrets.SF_BEARER_TOKEN_STAGE }}
          EOF

      - name: Create secrets file
        run: |
          cat > mesh/stage-secrets.yaml <<EOF
          MESH_AES_PASSPHRASE: ${{ secrets.MESH_AES_PASSPHRASE_STAGE }}
          COMMERCE_GRAPHQL_ENDPOINT: ${{ secrets.COMMERCE_GRAPHQL_ENDPOINT_STAGE }}
          ALLOWED_COMMERCE_HOSTS: ${{ secrets.ALLOWED_COMMERCE_HOSTS_STAGE }}
          SF_BEARER_TOKEN: ${{ secrets.SF_BEARER_TOKEN_STAGE }}
          SFDC_ENDPOINT: ${{ secrets.SFDC_ENDPOINT_STAGE }}
          ALLOWED_SFDC_HOSTS: ${{ secrets.ALLOWED_SFDC_HOSTS_STAGE }}
          EOF

      - name: Deploy mesh
        run: aio api-mesh update mesh.json --env .env --secrets mesh/stage-secrets.yaml
