name: PR Checks

on:
  pull_request:
    branches: [main, stage, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build mesh config
        run: npm run build:mesh

      - name: Validate mesh config
        run: node scripts/validate-mesh.js
        env:
          CI: true

      - name: Validate source files
        run: |
          echo "Checking source files exist..."
          test -f src/hooks/before-all.js || (echo "Missing src/hooks/before-all.js" && exit 1)
          test -f src/resolvers/encrypted-operations.js || (echo "Missing src/resolvers/encrypted-operations.js" && exit 1)
          test -f src/config/encryption-registry.js || (echo "Missing src/config/encryption-registry.js" && exit 1)
          test -f src/config/type-defs.js || (echo "Missing src/config/type-defs.js" && exit 1)
          test -f mesh/sfdc-openapi.json || (echo "Missing mesh/sfdc-openapi.json" && exit 1)
          echo "All source files present."

      - name: Validate GitHub Actions workflows
        run: npm run validate:workflows

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test
